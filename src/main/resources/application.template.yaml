# Instructions: Copy this file, rename it to 'application-dev.yaml', 
# and replace the dummy values with your actual database credentials.

spring:
  datasource:
    url: jdbc:mysql://<YOUR_DB_HOST>:<PORT>/<DB_NAME>
    username: <YOUR_USERNAME>
    password: <YOUR_PASSWORD>
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
      show-sql: true

# server configuration
server:
  port: 8080